{% extends 'base.html' %}
{% block title %}登录{% endblock %}
{% block body %}
<main class="auth-page">
    <section class="glass-card auth-card">
        <p class="eyebrow">Web Login</p>
        <h1>输入玩家号与密码</h1>
        <p class="subtle">先跟机器人“Fairy”发送“注册账号”命令。你的 QQ 号就是账号，机器人会回传一个验证码作为密码；登录后可以在网页中修改密码。</p>
        <label class="field-label">
            <span>玩家号</span>
            <input id="player-uid-input" placeholder="例如 10001">
        </label>
        <label class="field-label">
            <span>密码</span>
            <input id="code-input" placeholder="例如 654321">
        </label>
        <div class="hero-actions">
            <button class="primary-btn" id="login-btn">登录</button>
            <a class="secondary-btn" href="{{ url_for('main.home') }}">返回首页</a>
        </div>
        <div id="login-feedback" class="note-box"></div>
    </section>
</main>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
