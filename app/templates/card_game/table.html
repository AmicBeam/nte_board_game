{% extends 'common/base.html' %}
{% block title %}异象对决{% endblock %}
{% block body %}
<main class="duel-page">
    <div class="duel-round-info" id="duel-round-info" aria-label="回合信息">
        <strong id="round-counter">第 1 回合</strong>
        <span class="phase-chip" id="phase-chip">加载中</span>
        <button class="secondary-btn table-log-btn" type="button" data-right-panel-view="log">日志</button>
        <button class="icon-btn tutorial-help-btn round-help-btn" data-tutorial-open="table" type="button" aria-label="打开对战手册" title="打开手册">
            <span aria-hidden="true">?</span>
            <span class="sr-only">打开对战手册</span>
        </button>
    </div>
    <div class="top-action-controls" aria-label="牌桌操作">
        <button class="secondary-btn undo-turn-btn" id="undo-turn-btn" type="button">全部撤销</button>
        <button class="primary-btn danger-btn" id="reset-run-btn" type="button">撤退</button>
    </div>
    <section class="duel-layout">
        <aside class="duel-side-panel">
            <div class="section-title-row esper-title-row">
                <h2>异能者编队</h2>
                <button class="icon-btn tutorial-help-btn" data-tutorial-open="table" type="button" aria-label="打开对战手册" title="打开手册">
                    <span aria-hidden="true">?</span>
                    <span class="sr-only">打开对战手册</span>
                </button>
            </div>
            <div class="esper-standby-copy" id="esper-standby-copy">拖动异能者到已有素材的区域。</div>
            <div class="esper-standby-list" id="esper-standby-list" aria-label="异能者待命区"></div>
        </aside>

        <section class="duel-board-panel">
            <div class="opponent-command-row">
                <div class="opponent-nameplate">
                    <span>对手</span>
                    <strong id="opponent-top-name">对手</strong>
                </div>
                <button class="deck-zone discard-zone opponent-discard-zone deck-empty" id="opponent-discard-btn" type="button" data-discard-side="opponent" aria-label="对方墓地"></button>
                <div class="opponent-hand-panel">
                    <div class="mini-section-title">
                        <span>对手手牌</span>
                        <strong id="opponent-hand-count">0</strong>
                    </div>
                    <div class="opponent-hand-list" id="opponent-hand-list" aria-label="对手手牌"></div>
                </div>
                <div class="deck-zone opponent-deck-zone deck-empty" id="opponent-deck-zone" data-public-side="opponent" aria-label="对手牌库"></div>
            </div>
            <div class="locations-board" id="locations-board" aria-label="异象空间"></div>
            <div class="board-action-ring">
                <div class="mobile-score-sidecar" id="mobile-score-sidecar" aria-label="双方战力">
                    <span class="mobile-score-row opponent" data-score-row="opponent">对方 <strong data-score-side="opponent">0</strong></span>
                    <span class="mobile-score-leader" data-score-leader>持平</span>
                    <span class="mobile-score-row player" data-score-row="player">我方 <strong data-score-side="player">0</strong></span>
                </div>
                <div class="end-turn-stack">
                    <span class="final-round-label" id="final-round-label" hidden>决胜回合</span>
                    <button class="primary-btn end-turn-btn" id="end-turn-btn" type="button">完成部署</button>
                </div>
                <div class="energy-sidecar" id="energy-sidecar" aria-label="能量信息">
                    <span>能量</span>
                    <strong>0 / 0</strong>
                </div>
            </div>
        </section>

        <aside class="duel-right-panel" id="duel-right-panel" aria-label="战况抽屉">
            <div class="section-title-row right-panel-title-row">
                <div>
                    <h2 id="right-panel-title">战况</h2>
                    <p id="right-panel-subtitle">行动与资源</p>
                </div>
                <button class="secondary-btn copy-log-btn" id="copy-log-btn" type="button" hidden>复制</button>
            </div>
            <div class="right-panel-view right-info-view" id="right-info-view">
                <div class="right-resource-grid" id="right-resource-grid"></div>
            </div>
            <div class="right-panel-view right-log-view" id="right-log-view" aria-hidden="true">
                <div class="log-list" id="log-list"></div>
            </div>
            <div class="right-panel-view right-discard-view" id="right-discard-view" aria-hidden="true">
                <div class="discard-list" id="discard-list"></div>
            </div>
        </aside>
    </section>

    <section class="hand-dock" aria-label="手牌">
        <div class="discard-dock" aria-label="我方墓地">
            <button class="deck-zone discard-zone player-discard-zone deck-empty" id="player-discard-btn" type="button" data-discard-side="player" aria-label="我方墓地"></button>
        </div>
        <div class="hand-rail" id="hand-list"></div>
        <div class="deck-zone player-deck-zone deck-empty deck-count-only" id="player-deck-zone" data-public-side="player" aria-label="我方牌库"></div>
    </section>

    <aside class="mobile-location-rule-line" id="mobile-location-rule-line" aria-label="战场说明" aria-hidden="true"></aside>
    <section class="selection-overlay" id="selection-overlay" aria-hidden="true"></section>
    <div class="tutorial-focus-scrim" id="tutorial-focus-scrim" aria-hidden="true"></div>
    <aside class="tutorial-guidance-popup" id="tutorial-guidance-popup" aria-hidden="true"></aside>
    <section class="discard-modal" id="discard-modal" aria-hidden="true">
        <div class="discard-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="discard-modal-title">
            <div class="section-title-row right-panel-title-row">
                <div>
                    <h2 id="discard-modal-title">墓地</h2>
                    <p id="discard-modal-subtitle">墓地卡牌</p>
                </div>
            </div>
            <div class="discard-list" id="discard-modal-list"></div>
        </div>
    </section>
    <section class="result-modal" id="result-modal" aria-hidden="true">
        <div class="result-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="result-modal-title">
            <p class="eyebrow" id="result-modal-eyebrow">对局结束</p>
            <h2 id="result-modal-title">结算</h2>
            <p id="result-modal-subtitle">战场结算完成。</p>
            <div class="result-summary-grid" id="result-summary-grid"></div>
            <div class="result-modal-actions">
                <button class="secondary-btn result-collapse-btn" id="result-collapse-btn" type="button">收起</button>
                <button class="primary-btn result-confirm-btn" id="result-confirm-btn" type="button">确认</button>
            </div>
        </div>
        <button class="result-collapsed-pill" id="result-collapsed-pill" type="button" aria-label="查看对局结算">
            <span>对局结算</span>
            <strong id="result-collapsed-title">结算</strong>
        </button>
    </section>
    <div class="duel-title-banner" id="duel-title-banner" aria-hidden="true"></div>
    <div class="effect-arrow-layer" id="effect-arrow-layer" aria-hidden="true"></div>
    <aside class="duel-card-preview" id="card-preview" aria-hidden="true"></aside>
    <div class="card-drag-ghost" id="card-drag-ghost" aria-hidden="true"></div>
    <div class="duel-toast" id="duel-toast" aria-hidden="true"></div>
</main>
<script src="{{ url_for('static', filename='common/js/common.js') }}"></script>
<script src="{{ url_for('static', filename='card_game/js/table.js') }}"></script>
{% endblock %}
