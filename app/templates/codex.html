{% extends 'base.html' %}
{% block title %}图鉴{% endblock %}
{% block body %}
<main class="codex-page">
    <section class="glass-card panel-header codex-header">
        <div>
            <p class="eyebrow">图鉴</p>
            <h1>粉爪档案库</h1>
            <p class="subtle" id="codex-map-summary">正在读取地图资料。</p>
        </div>
        <div class="header-actions">
            <a class="secondary-btn" href="{{ url_for('main.home') }}">返回主界面</a>
            <a class="secondary-btn" href="{{ url_for('main.build_page') }}">构筑</a>
        </div>
    </section>
    <section class="glass-card codex-shell">
        <div class="codex-tabs" aria-label="图鉴分类">
            <button class="active" data-codex-tab="objects" type="button">地图道具</button>
            <button data-codex-tab="items" type="button">道具</button>
            <button data-codex-tab="loot" type="button">粉爪大劫案</button>
            <button data-codex-tab="enemies" type="button">敌人</button>
        </div>
        <div class="codex-grid" id="codex-grid"></div>
    </section>
</main>
<script src="{{ url_for('static', filename='js/common.js') }}"></script>
<script src="{{ url_for('static', filename='js/codex.js') }}"></script>
{% endblock %}
