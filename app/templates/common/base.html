<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}NTE Board Game{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/brand/duel-icon.webp') }}" type="image/webp">
    <link rel="stylesheet" href="{{ url_for('static', filename='common/css/app.css') }}">
    {% if request.endpoint not in ['main.login_page', 'main.kongmu_page'] %}
    <script>
        (function () {
            try {
                if (!window.localStorage.getItem('nte_token')) {
                    window.location.replace("{{ url_for('main.login_page') }}");
                }
            } catch (error) {
                window.location.replace("{{ url_for('main.login_page') }}");
            }
        }());
    </script>
    {% endif %}
    {% block head %}{% endblock %}
</head>
<body>
    <div class="shell">
        {% block body %}{% endblock %}
    </div>
</body>
</html>
