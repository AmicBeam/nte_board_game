{% extends 'base.html' %}
{% block title %}空幕规划器{% endblock %}
{% block body %}
<main class="kongmu-page">
    <section class="glass-card panel-header kongmu-header">
        <div>
            <p class="eyebrow">Kongmu Planner</p>
            <h1>空幕规划器</h1>
        </div>
        <div class="header-actions">
            <a class="secondary-btn" href="{{ url_for('main.home') }}">返回主界面</a>
            <button class="primary-btn" id="kongmu-plan-btn" type="button" disabled>开始计算</button>
        </div>
    </section>

    <section class="kongmu-workbench">
        <section class="glass-card kongmu-picker-panel">
            <div class="section-title-row">
                <div>
                    <h2>角色</h2>
                </div>
                <label class="kongmu-search">
                    <span class="sr-only">搜索角色</span>
                    <input id="kongmu-character-search" type="search" placeholder="搜索角色">
                </label>
            </div>
            <div class="kongmu-character-grid" id="kongmu-character-grid"></div>
        </section>

        <section class="glass-card kongmu-picker-panel">
            <div class="section-title-row">
                <div>
                    <h2>卡带</h2>
                </div>
                <label class="kongmu-search">
                    <span class="sr-only">搜索卡带</span>
                    <input id="kongmu-cartridge-search" type="search" placeholder="搜索卡带">
                </label>
            </div>
            <div class="kongmu-cartridge-grid" id="kongmu-cartridge-grid"></div>
        </section>
    </section>

    <section class="glass-card kongmu-result-shell" id="kongmu-result-shell" hidden>
        <div class="kongmu-result-head">
            <div>
                <p class="eyebrow">Result</p>
                <h2 id="kongmu-result-title">空幕方案</h2>
            </div>
            <div class="kongmu-result-count">
                <strong id="kongmu-visible-count">0</strong>
                <span>/</span>
                <span id="kongmu-total-count">0</span>
            </div>
        </div>

        <div class="kongmu-filter-panel" id="kongmu-filter-panel"></div>
        <div class="kongmu-empty-result" id="kongmu-empty-result" hidden>没有找到满足当前筛选的方案。</div>
        <div class="kongmu-solution-grid" id="kongmu-solution-grid"></div>
    </section>
</main>
<script src="{{ url_for('static', filename='js/kongmu.js') }}"></script>
{% endblock %}
