  <path d="M32 32l8 8M88 88l8 8M96 32l-8 8M40 88l-8 8" stroke="#5e879b" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
  <path d="M64 28l14 38-14-6-14 6z" fill="url(#needleRed)" stroke="#7c1624" stroke-linejoin="round" stroke-width="2" filter="url(#glow)"/>
  <path d="M64 100L50 62l14 6 14-6z" fill="url(#needleBlue)" stroke="#0c577d" stroke-linejoin="round" stroke-width="2"/>
