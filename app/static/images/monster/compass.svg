      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.58" stop-color="#dfe9f4"/>
      <stop offset="1" stop-color="#8bb1c9"/>
    </radialGradient>
    <linearGradient id="needleRed" x1="34" y1="21" x2="84" y2="96" gradientUnits="userSpaceOnUse">
